<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 100px 100px;
            grid-template-rows: 100px 100px;
            gap: 2px;
            text-align: center;
        }
        #item1{
            grid-column: 1/2;
            grid-row: 1/2;
            background-color: darkolivegreen;
        }
        #item2{
            grid-column: 2/2;
            grid-row: 1/2;
            background-color: cadetblue;
        }
        #item3{
            grid-column: 1/2;
            grid-row: 2/2;
            background-color: burlywood;
        }
        #item4{
            grid-column: 2/2;
            grid-row: 2/2;
            background-color: darkkhaki;
        }
    </style>
</head>
<body>
    <!--Grid is a multi-dimensional layout.
     It has 2D layout system for rows and columns.
     Activate with display:grid;
     Children become grid items.
     Define structure with grid-template property.
     Individual units are called grid-cells.-->
    <div class="container">
        <div id="item1">Item1</div>
        <div id="item2">Item2</div>
        <div id="item3">Item3</div>
        <div id="item4">Item4</div>
    </div>

</body>
</html>
