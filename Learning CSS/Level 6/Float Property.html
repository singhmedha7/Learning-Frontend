<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Property</title>
    <style>
        .container{
            height: 110px;
            width: 300px;
            border: 1px solid #000;
            background-color: dimgrey;
        }
        .box{
            height: 100px;
            width: 100px;
            margin: 5px;
            border: 1px solid black;
            border-radius: 10px;
        }
        #box1{
            background-color: blueviolet;
            float: right;
        }
        #box2{
            background-color: deeppink;
            float: left;
        }
    </style>
</head>
<body>
    <!--Float property allows elements to be aligned to the left or righ within their containing element.
     It can take values like left, right, or none to determine the floating direction.
     It is an old layout technique. Less commonly used with the advent of flexbox.-->
    <div class="container">
        <div id="box1" class="box"></div>
        <div id="box2" class="box"></div>
    </div>
</body>
</html>
