<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <link rel="stylesheet" href="Flexbox.css">
</head>
<body>
    <!--Flexbox is a one dimensional layout method for arranging items in rows or columns.
     Items flex(expand) to fill additional space or shrink to fit into smaller spacees.
     Used with the help of display : flex-->
    
    <!--Flex-direction is the property used to define the direction in a flex container.
     Row value aligns the flex items horizontally, in a left-to-right fashion.
     Column value stacks the flex items vertically, from top to bottom.
     Adding -reverse to row or column(row-reverse or column-reverse) reverses the order of the items.-->

    <!--Flexbox Item Properties-->
     <!--Align self property is used to override the container's align-items property.
     It aligns them differenty along the cross-axis.-->

    <!--Flex shrink property is used to determine how much a flex item will shrink relative to other items in flex container.-->

    <!--Flex grow specifies how much an item will grow relative to other items.-->

    <!--Order allows you to define the sequence in which flex items appear within the flex container.
     It overrides the original order in html.-->

    <h1 id="Heading">Flex Container</h1>
    <div id="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
    </div>


    <!--Flexbox Container Properties-->
    <!--Flexbox Container(justify content) aligns flex items along the main axis.
     flex-start aligns item to the start of the flex container.
     flex-end aligns items to the end of flex container.
     centre aligns the items at the centre.
     space-between, space-around, space-evenly distribute space between items evenly.-->

    <!--Flex wrap is used to move the elements to the next line in case of lack of space.
     nowrap is default.
     wrap is used to move the last elements to the next line.
     wrap-reverse is used to wrap the end elements to the line above.-->

    <!--Align items is used to align the flex container's items along the cross-axis, which is perpendicular to main axis.-->

    <!--Align content is used to adjust the spacing between flex lines within a flex container, particularly when there is extra space along the cross-axis.-->


    <h1 id="heading">Flex Container</h1>
    <div id="Container">
        <div id="box5" class="Box">5</div>
        <div id="box6" class="Box">6</div>
        <div id="box7" class="Box">7</div>
        <div id="box8" class="Box">8</div>
        <div id="box9" class="Box">9</div>
        <div id="box10" class="Box">10</div>
    </div>
    
</body>
</html>
