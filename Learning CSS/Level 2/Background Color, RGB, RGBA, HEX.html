<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color, RGB, RGBA, HEX</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
        }
        #First{
            background-color: aquamarine;
            color: brown;
        }
        button{
            background-color:rgb(66, 6, 6);
            color: azure;
        }
    </style>
</head>
<body>
    <!-- background color is used to add color to the bakground of the element-->
    <div id="First">First</div>
    <button type="button">Click Me</button><hr>

    <!--Color System using rgb model-->
        <div style="background-color: rgb(121, 54, 54);"> Background</div>
    <!--Hex code shorthand-->
        <div style="background-color: #801a;"> Background</div>
    <!--Alpha channel 0.0-totally transparent, 1.0-totally visible-->
        <div style="background-color: rgba(121, 54, 54,0.5);"> Background</div>

</body>
</html>
