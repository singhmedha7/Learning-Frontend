<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Units, Height, Width</title>
    <style>
        .box{
            height: 40px; width: 60px;
        }
        #box1{
            background-color: aquamarine;
        }
        #box2{
            background-color: chartreuse;
        }
        #box3{
            background-color: coral;
        }
    </style>
</head>
<body>
    <h1>Pixels:</h1><h2> px are fixed size units representing a dot ona computer</h2> 
    <h2>Commonly used in graphics, web design, margins and more.</h2> <hr>
    <!-- Height and width are used to specify dimensions.
     Can use units like px.
     Influences padding , border, margin.
     Can utilise min-height, min-width, max-height, max-width to set restrictions on dimensions.-->
    <div id="box1" class="box">Box 1</div><br>
    <div id="box2" class="box">Box 2</div><br>
    <div id="box3" class="box">Box 3</div>

</body>
</html>
