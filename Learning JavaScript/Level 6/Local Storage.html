<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage</title>
</head>
<body>
    <!--Local storage is persistent data storage in the browser.
    setItem: Stores data as key-value pairs.
    Only strings can be stored.
    getItem: Retrieves data based on key.
    Other methods: localStorage.clear(),removeItem().
    Do net store sensitive information. Viewable in storage console.-->
    <script>
        let product={
            name :'T-shirt',
            price: 799,
            rating: {
                starts: 4.5,
                review: 80,
            },
        };
        // localStorage.setItem('Name','Meere');
        // localStorage.setItem('Age', '23');
        console.log(localStorage.getItem('Name'));


        localStorage.setItem('product',JSON.stringify(product));
        console.log(localStorage.getItem('product'));
        let product2=JSON.parse(localStorage.getItem('product'));
        console.log(product2);

        localStorage.removeItem('Age');
        localStorage.clear();
    </script>
</body>
</html>
