<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <!--An array is just a list of values.
    Its index starts with 0.
    Arrays are used for storing multiple values in a single variable.
    Syntax- let myArray=[1,'code',null,{likes:'1 M'}];
    Array can be saved to a variable.
    In order to access values, we use [] with index.
    Arrays can hold any values including arrays,int,str,objects,etc.-->
    <script>
        let numbers=[1,4,6,7,8,4,2,3];
        console.log(numbers);
        console.log(numbers[3]);
        console.log(numbers[5]);
    </script>
</body>
</html>
