<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Properties and Methods</title>
</head>
<body>
    <!--Array.isArray() checks if a variable is an array.
    Length property holds the size of the array.
    Common Methods:
     push/pop: Add or remove to end.
     shift/unshift: Add or remove from front.
     splice: Add or remove elements.
     toString: Convert to string.
     sort: Sort elements.
     valueOf: Get array itself.
    Arrays also use reference like objects.
    De-structuring also works for arrays.-->
    <script>
        let obj={ijk:34};
        let some=[1,true,null,'gcd'];
        console.log(some);
        console.log(typeof some);
        console.log(Array.isArray(some));
        console.log(Array.isArray(obj));
        console.log(some.length);

        some.push(70);
        console.log(some);
        let popped=some.pop();
        console.log('popped '+ popped);

        some.unshift('teracotta');
        console.log(some);
        console.log(some.shift());

        some.splice(2,1); //(index,no of elements to delete)
        console.log(some);

        console.log(some.toString());

        let arr=[3,6,2,7,8,3,4,6,7];
        console.log(arr);
        arr.sort();
        console.log(arr);

        console.log(arr.valueOf());
        
    </script>
</body>
</html>
