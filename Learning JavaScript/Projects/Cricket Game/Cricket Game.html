<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
        button{
            width: 60px;
        }
    </style>
</head>
<body>
    <h1>Bat Ball Stump Game</h1>

    <!--BAT-->
    <button onclick="
    let userChoice='You have picked Bat';
    let computerChoice=generateComputerChoice();
    let resultMsg;
    if(computerChoice==='Ball'){
        resultMsg='User won!';
    }
    else if(computerChoice==='Stump'){
        resultMsg='Computer won!';
    }
    else{
        resultMsg=`It's a tie`;
    }

    alert(`${userChoice} \nComputer has picked ${computerChoice} \n${resultMsg}`);
    ">Bat</button>


    <!--BALL-->
    <button onclick="
    userChoice='You have picked Ball';
    computerChoice=generateComputerChoice();

    if(computerChoice==='Stump'){
        resultMsg='User won!';
    }
    else if(computerChoice==='Bat'){
        resultMsg='Computer won!';
    }
    else{
        resultMsg=`It's a tie`;
    }

    alert(`${userChoice} \nComputer has picked ${computerChoice} \n${resultMsg}`);
    ">Ball</button>


    <!--STUMP-->
    <button onclick="
    userChoice='You have picked Stump';
    computerChoice=generateComputerChoice();
    
    if(computerChoice==='Bat'){
        resultMsg='User won!';
    }
    else if(computerChoice==='Ball'){
        resultMsg='Computer won!';
    }
    else{
        resultMsg=`It's a tie`;
    }

    alert(`${userChoice} \nComputer has picked ${computerChoice} \n${resultMsg}`);
    ">Stump</button>




    <!--Improving code using functions-->
    <script>
        function generateComputerChoice(){
            // To pick a random number and decide Computer's choice
            let randomNumber=Math.random()*3;
            if(randomNumber<=1){
                return'Bat';
            }
            else if(randomNumber<=2){
                return'Ball';
            }
            else{
                return'Stump';
            }
        }
    </script>
</body>
</html>
