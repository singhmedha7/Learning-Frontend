<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
        button{
            width: 60px;
        }
    </style>
</head>
<body>
    <h1>Bat Ball Stump Game</h1>

    <!--BAT-->
    <button onclick="
    let userChoice='You have picked Bat';
    // To pick a random number and decide Computer's choice
    let randomNumber=Math.random()*3;
    let computerChoice;
    if(randomNumber<=1){
        computerChoice='Bat';
        console.log('Computer has also picked Bat');
    }
    else if(randomNumber<=2){
        computerChoice='Ball';
        console.log('Computer has picked Ball');
    }
    else{
        computerChoice='Stump';
        console.log('Computer has picked Stump');
    }

    let resultMsg;
    if(computerChoice==='Ball'){
        resultMsg='User won!';
    }
    else if(computerChoice==='Stump'){
        resultMsg='Computer won!';
    }
    else{
        resultMsg=`It's a tie`;
    }

    alert(`${userChoice} \nComputer has picked ${computerChoice} \n${resultMsg}`);
    ">Bat</button>

    <!--BALL-->
    <button onclick="
    userChoice='You have picked Ball';
    // To pick a random number and decide Computer's choice
    randomNumber=Math.random()*3;
    if(randomNumber<=1){
        computerChoice='Bat';
        console.log('Computer has picked Bat');
    }
    else if(randomNumber<=2){
        computerChoice='Ball';
        console.log('Computer has also picked Ball');
    }
    else{
        computerChoice='Stump';
        console.log('Computer has picked Stump');
    }


    if(computerChoice==='Stump'){
        resultMsg='User won!';
    }
    else if(computerChoice==='Bat'){
        resultMsg='Computer won!';
    }
    else{
        resultMsg=`It's a tie`;
    }

    alert(`${userChoice} \nComputer has picked ${computerChoice} \n${resultMsg}`);
    ">Ball</button>

    <!--STUMP-->
    <button onclick="
    userChoice='You have picked Stump';
    // To pick a random number and decide Computer's choice
    randomNumber=Math.random()*3;
    if(randomNumber<=1){
        computerChoice='Bat';
        console.log('Computer has picked Bat');
    }
    else if(randomNumber<=2){
        computerChoice='Ball';
        console.log('Computer has picked Ball');
    }
    else{
        computerChoice='Stump';
        console.log('Computer has also picked Stump');
    }

    
    if(computerChoice==='Bat'){
        resultMsg='User won!';
    }
    else if(computerChoice==='Ball'){
        resultMsg='Computer won!';
    }
    else{
        resultMsg=`It's a tie`;
    }

    alert(`${userChoice} \nComputer has picked ${computerChoice} \n${resultMsg}`);
    ">Stump</button>
</body>
</html>
