<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
        button{
            width: 60px;
        }
    </style>
</head>
<body>
    <h1>Bat Ball Stump Game</h1>
    <button onclick="
    console.log('You have picked Bat');
    // To pick a random number and decide Computer's choice
    let randomNumber=Math.random()*3;
    let computerChoice;
    if(randomNumber>0 && randomNumber<=1){
        computerChoice='Bat';
        console.log('Computer has picked Bat');
    }
    else if(randomNumber>1 && randomNumber<=2){
        computerChoice='Ball';
        console.log('Computer has picked Ball');
    }
    else{
        computerChoice='Stump';
        console.log('Computer has picked Stump');
    }

    if(computerChoice==='Ball'){
        console.log('User won!')
    }
    ">Bat</button>
    <button>Ball</button>
    <button>Stump</button>
</body>
</html>
