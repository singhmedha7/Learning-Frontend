<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
        button{
            width: 60px;
        }
    </style>
</head>
<body>
    <h1>Bat Ball Stump Game</h1>

    <!--BAT-->
    <button onclick="
    let userChoice='Bat';
    let computerChoice=generateComputerChoice();
    let resultMsg=getResult(userChoice,computerChoice);
    showResult(userChoice,computerChoice,resultMsg);
    ">Bat</button>


    <!--BALL-->
    <button onclick="
    userChoice='Ball';
    computerChoice=generateComputerChoice();
    resultMsg=getResult(userChoice,computerChoice);
    showResult(userChoice,computerChoice,resultMsg);
    ">Ball</button>


    <!--STUMP-->
    <button onclick="
    userChoice='Stump';
    computerChoice=generateComputerChoice();
    resultMsg=getResult(userChoice, computerChoice);
    showResult(userChoice,computerChoice,resultMsg);
    ">Stump</button>




    <!--Improving code using functions-->
    <script>
        function generateComputerChoice(){
            // To pick a random number and decide Computer's choice
            let randomNumber=Math.random()*3;
            if(randomNumber<=1){
                return'Bat';
            }
            else if(randomNumber<=2){
                return'Ball';
            }
            else{
                return'Stump';
            }
        }
        

        function getResult(userMove,computerMove){
            console.log(`User: "${userMove}", Computer: "${computerMove}"`);
            if(userMove===computerMove) {
                return `It's a tie`;
            }

            if(userMove==='Bat'){
                if(computerMove==='Ball'){
                    return 'User won!';
                }
                else if(computerMove==='Stump'){
                    return 'Computer won!';
                }
            }
            else if(userMove==='Ball'){
                if(computerMove==='Stump'){
                    return 'User won!';
                }
                else if(computerMove==='Bat'){
                    return 'Computer won!';
                }
            }
            else if(userMove==='Stump'){
                if(computerMove==='Bat'){
                    return 'User won!';
                }
                else if(computerMove==='Ball'){
                    return 'Computer won!';
                }
            }
        }


        function showResult(userMove,computerMove,result){
            alert(`You have picked ${userMove} \nComputer has picked ${computerMove} \n${result}`);
        }
    </script>
</body>
</html>
