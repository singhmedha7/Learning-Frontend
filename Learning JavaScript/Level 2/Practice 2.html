<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Bag</title>
    <style>
        .bag{
            background-color: rgb(122, 240, 122);
            border-radius: 7px;
            padding: 5px 15px;
            border: none;
        }
        #Wishlist{
            text-transform: uppercase;
            padding: 5px 50px;
            border-radius: 5px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <button type="button" class="bag" onclick="cartQuantity++;document.querySelector('#cartsummary').innerText = `Your Bad has ${cartQuantity} items`;">Add to Bag</button>
    <button id="Wishlist" onclick="cartQuantity--;document.querySelector('#cartsummary').innerText = `Your Bad has ${cartQuantity} items`;">Move to Wishlist</button>
    <button class="bag" onclick="cartQuantity+=2;document.querySelector('#cartsummary').innerText = `Your Bad has ${cartQuantity} items`;">Add 1+1 sale item</button>
    <br>
    <br>
    <h1 id="cartsummary">Your Bag has 0 items</h1>

    <script>
        let cartQuantity = 0;
        document.querySelector('#cartsummary').innerText = `Your Bad has ${cartQuantity} items`;
    </script>
</body>
</html>
