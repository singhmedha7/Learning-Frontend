<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Page to use JS tag script, alert, query selectors</title>
  <style>
    #click{
        color: black;
        background-color: plum;
        border: 2px solid white;
        box-shadow:0px 2px 2px 0px silver ;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Page</h1>
  <button type="button" id="click" class="Mybutton">Button One</button><br><br>
  <button type="button" class="Mybutton">Button Two</button>
  <hr>
  <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum quod, quidem porro perspiciatis tempora architecto non perferendis beatae. Dignissimos, enim.</p>
  <a href="https://www.knowledgegate.in">Visit KnowledgeGate</a>

  <!--<script> tag is used to add JavaScript to our html page.
  The tag is situated at the end of the content in body tag.
  An external JS file can be linked to the html file using src attribute inside <script>.

  alert() is used to show a pop-up on our web page before it completes loading.
  console.log() is used to show the message in console instead of pop-up

  Query selectors like getElementById, getElementsByClassName, querySelector/All are used to select elements using Id, Class, Tags etc.
  querySelector/All is used just like selectors in CSS.
  querySelectorAll is used when a tag or class defines more than one element.
  Syntax- document.getElementById('click') (for the former two)
  Syntax- document.querySelector('#click')-->  
<script>
    alert('I am inside html page learning JS')
    console.log('Hello')
</script>
</body>
</html>
