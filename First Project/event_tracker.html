<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1 .0, user-scalable=yes">
   <title>Event Tracker & Reminder</title>
   <style>
   /*-----CSS-----*/
   * {
     box-sizing: border-box;
     font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
   }
   
   body {
     background: linear-gradient(135deg, #fce4ec 0%, #e1d9f0 100%);
     margin: 0;
     min-height: 100vh;
     display: flex;
     justify-content: center;
     align-items: center;
     padding: 1rem;
   }

   .app-container {
     max-width: 800px;
     width: 100%;
     background: rgba(255, 250, 245, 0.9);
     backdrop-filter: blur(8px);
     border-radius: 2.5rem;
     box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
     padding: 1.8rem;
     transition: all 0.2s ease;
   }

   h1 {
     font-size: 2rem;
     margin: 0 0 0.25rem 0;
     color: #b56576;  /* dusty rose */
     display: flex;
     align-items: center;
     gap: 0.5rem;
     font-weight: 600;
   }

   h1 small {
     font-size: 0.7rem;
     font-weight: normal;
     background: #e6b0c2;
     color: white;
     padding: 0.2rem 0.8rem;
     border-radius: 40px;
     letter-spacing: 0.5px;
   }

   .sub {
     color: #8e7b9c;
     margin-bottom: 1.8rem;
     border-left: 4px solid #f4acb7;
     padding-left: 1rem;
     font-size: 0.9rem;
     font-weight: 500
   }

   /* form */
   .event-form {
     background: #fff9fc;
     border-radius: 2rem;
     padding: 1.4rem;
     box-shadow: 0 8px 20px rgba(181, 101, 118, 0.1);
     margin-bottom: 2rem;
     border: 1px solid #ffe0e7;
   }

   form-row {
     display: flex;
     flex-wrap: wrap;
     gap: 0.8rem;
     align-items: flex-end;
   }

   .input-group {
     flex: 1 1 200px;
   }

   label {
     display: block;
     font-size: 0.7rem;
     font-weight: 700;
     text-transform: uppercase;
     letter-spacing: 0.8px;
     color: #b5838a;
     margin-bottom: 0.3rem;
   }

   input {
     width: 100%;
     padding: 0.7rem 1rem;
     border: 1px solid #fadadd;
     border-radius: 1.5rem;
     font-size: 0.95rem;
     transition: 0.2s;
     background: #ffffff;
     font-family: inherit;
   }

   input:focus {
     outline: none;
     border-color: #f4acb7;
     box-shadow: 0 0 0 3px rgba(244, 172, 183, 0.3);
     background: #fff5f7;
   }

   button {
     background: #f4acb7;
     color: white;
     border: none;
     padding: 0.7rem 1.6rem;
     border-radius: 2rem;
     font-weight: 600;
     font-size: 0.9rem;
     cursor: pointer;
     transition: all 0.2s ease;
     box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
     font-family: inherit;
   }

   button:hover {
     background: #e5989e;
     transform: translateY(-2px);
     box-shadow: 0 6px 12px rgba(229, 152, 158, 0.2);
   }

   /* events list */
   .events-header {
     display: flex;
     justify-content: space-between;
     align-items: baseline;
     flex-wrap: wrap;  
     margin-bottom: 1rem;
   }

   .events-header {
     font-size: 1.5rem;
     margin: 0;
     color: #b56576;
     font-weight: 600;
   } 

   .clear-btn {
     background: #e9e1f0;
     color: #8e7b9c;
     padding: 0.4rem 1 rem;
     font-size: 0.8rem;
     box-shadow: none;
   }

   .clear-btn:hover {
     background: #d9cde6;
     color: #5e4b6e;
     transform: translateY(-1px);
   }

   event-list {
     list-style: none;
     padding: 0;
     margin: 0;
     display: flex;
     flex-direction: column;
     gap: 0.8rem;
     max-height: 380px;
     overflow-y: auto;
   }

   .event-item {
     background: #fff9fc;
     border-radius: 1.5rem;
     padding: 0.9rem 1.2rem;
     display: flex;
     justify-content: space-between;
     align-items: center;
     flex-wrap: wrap;
     gap: 0.5rem;
     box-shadow: 0 4px 12px rgba(181, 101, 118, 0.08);
     transition: all 0.2s;
     border-left: 6px solid #e6b0c2;
   }

   .event-item:hover {
     transform: translateX(4px);
     background: #fff5f8;
   }

   .event-info {
     flex: 3;
   }

   .event-name {
     font-weight: 700;
     font-size: 1rem;
     color: #5e4b6e;
   }  

   .event-datetime {
     font-size: 0.75rem;
     color: #9b7b8c;
     font-family: monospace;
     margin-top: 0.2rem;
   }

   .delete-btn {
     background: #ffe2e6;
     color: #b56576;
     border: none;
     padding: 0.4rem 1rem;
     border-radius: 2rem;
     font-size: 0.7rem;
     font-weight: bold;
     cursor:pointer;
     transition: 0.2s;
   }

   .delete-btn:hover {
     background: #fcc4cd;
     color: #8e4b5c;
     transform: scale(0.96);
   }

   .empty-message {
     text-align: center;
     color: #b5838a;
     padding: 2rem;
     font-style: italic;
     font-weight: 500;
   }

   .notification-status {
     font-size: 0.7rem;
     margin-top: 1.2rem;
     text-align: right;
     color: #9e7b8c;
     background: #fff0f3;
     display: inline-block;
     width: auto;
     padding: 0.3rem 1rem;
     border-radius: 30px;
   }

   footer {
     font-size: 0.7rem;
     text-align: center;
     margin-top: 1.5rem;
     color: #b5838a;
     border-top: 1px solid #ffe0e7;
     padding-top: 1rem;
   }
  </style>
</head>
<body>
<div class="app-container">
   <h1>Event Tracker <small>+ reminders</small></h1>
   <div class="sub">Add events - we'll notify you 1 day before</div>

   <!--Form to add new events-->
   <div class="event-form">
    <div class="form-row">
     <div class="input-group">
      <label>Event name</label>
      <input type="text" id="eventName" placeholder="e.g., Dentist appointment" autocomplete="off">
     </div>
    <div class="input-group">
       <label>Date</label>
       <input type="date" id="eventDate">
    </div>
    <div class="input-group">
       <label>Time (24h)</label>
       <input type="time" id="eventTime">
    </div>
    <button id="addEventBtn" onclick="addEventFromForm()"> Add Event</button>
   </div>
  </div>

 <!--Events list header + clear button-->
 <div class="events-header">
    <h2> Upcoming events</h2>
    <button id="clearAllBtn" class="clear-btn"> Clear all events</button>
 </div>

 <!--Container for events list-->
 <ul id="eventList" class="event-list">
   <li class="empty-message">No events added yet. Add your first event!</li>
 </ul>

 <div class="notification-status" id="notifStatus"> Notification permission: not requested</div>
 <footer>Reminders appear as browser notifications (one day before). Keep this tab open.</footer>
</div>


<script>
  // ---------- JAVASCRIPT ----------
  // All events are stored as an array in localStorage
  let events = [];

  // Load events from localStorage when page loads
  function loadEvents() {
    const stored = localStorage.getItem('eventTracker');
    if (stored) {
      events = JSON.parse(stored);
    } else {
      events = [];
    }
    renderEventList();
  }

  // Save events to localStorage
  function saveEvents() {
    localStorage.setItem('eventTracker', JSON.stringify(events));
  }

  // Convert date+time string to a Date object (local time)
  function makeDateTime(dateStr, timeStr) {
    if (!dateStr || !timeStr) return null;
    // construct ISO-like string: "YYYY-MM-DDTHH:MM"
    const isoString = `${dateStr}T${timeStr}`;
    return new Date(isoString);
  }

  // Add a new event
  function addEvent(name, dateStr, timeStr) {
    if (!name.trim()) {
      alert("Please enter an event name.");
      return false;
    }
    if (!dateStr || !timeStr) {
      alert("Please select both date and time.");
      return false;
    }
    const eventDateTime = makeDateTime(dateStr, timeStr);
    if (!eventDateTime || isNaN(eventDateTime.getTime())) {
      alert("Invalid date/time combination.");
      return false;
    }
    // Don't allow events in the past
    const now = new Date();
    if (eventDateTime < now) {
      alert("Cannot add an event in the past. Please choose future date/time.");
      return false;
    }

    const newEvent = {
      id: Date.now() + Math.random() * 10000, // unique id
      name: name.trim(),
      date: dateStr,
      time: timeStr,
      timestamp: eventDateTime.getTime()
    };
    events.push(newEvent);
    // sort events by timestamp (soonest first)
    events.sort((a, b) => a.timestamp - b.timestamp);
    saveEvents();
    renderEventList();
    return true;
  }

  // Delete an event by id
  function deleteEvent(id) {
    events = events.filter(ev => ev.id !== id);
    saveEvents();
    renderEventList();
  }

  // Clear all events
  function clearAllEvents() {
    if (events.length > 0 && confirm("Delete all events permanently?")) {
      events = [];
      saveEvents();
      renderEventList();
    }
  }

  // Render the event list (only future events)
  function renderEventList() {
    const now = new Date();
    const futureEvents = events.filter(ev => new Date(ev.timestamp) >= now);
    const listContainer = document.getElementById('eventList');
    
    if (futureEvents.length === 0) {
      listContainer.innerHTML = '<li class="empty-message">🎉 No upcoming events. Add a new one!</li>';
      return;
    }
    
    let html = '';
    futureEvents.forEach(ev => {
      // format date nicely: "Mar 20, 2026 at 14:30"
      const eventDate = new Date(ev.timestamp);
      const formattedDate = eventDate.toLocaleString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      html += `
        <li class="event-item">
          <div class="event-info">
            <div class="event-name">${escapeHtml(ev.name)}</div>
            <div class="event-datetime">📅 ${formattedDate}</div>
          </div>
          <button class="delete-btn" data-id="${ev.id}">Delete</button>
        </li>
      `;
    });
    listContainer.innerHTML = html;
    
    // Attach delete event listeners
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = Number(btn.getAttribute('data-id'));
        deleteEvent(id);
      });
    });
  }

  // Simple helper to prevent XSS
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // ---------- NOTIFICATION & REMINDER LOGIC ----------
  let notificationPermission = false;
  
  // Request notification permission on first user interaction (optional)
  function askNotificationPermission() {
    if (!("Notification" in window)) {
      document.getElementById('notifStatus').innerText = "🔕 Browser does not support notifications";
      return false;
    }
    if (Notification.permission === "granted") {
      notificationPermission = true;
      document.getElementById('notifStatus').innerHTML = "✅ Notifications enabled — you'll get reminders!";
      return true;
    } else if (Notification.permission !== "denied") {
      Notification.requestPermission().then(perm => {
        if (perm === "granted") {
          notificationPermission = true;
          document.getElementById('notifStatus').innerHTML = "✅ Notifications enabled — you'll get reminders!";
        } else {
          document.getElementById('notifStatus').innerHTML = "⚠️ Notifications blocked. Enable in browser settings for reminders.";
        }
      });
    } else {
      document.getElementById('notifStatus').innerHTML = "🔕 Notifications blocked. Please allow manually for reminders.";
    }
    return false;
  }
  
  // Show a reminder notification for an event
  function showReminder(event) {
    if (!notificationPermission && Notification.permission === "granted") {
      notificationPermission = true;
    }
    if (!notificationPermission) return;
    
    const eventTime = new Date(event.timestamp);
    const formattedTime = eventTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const notificationTitle = `⏰ Reminder: ${event.name}`;
    const notificationBody = `Starts at ${formattedTime}`;
    
    new Notification(notificationTitle, {
      body: notificationBody,
      icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'%3E%3Cpath d='M12 2C8.13 2 5 5.13 5 9v4c0 .83.67 1.5 1.5 1.5h11c.83 0 1.5-.67 1.5-1.5V9c0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5v3H7V9c0-2.76 2.24-5 5-5z'/%3E%3C/svg%3E"
    });
  }
  
  // Check for upcoming events that are due within the next 60 seconds
  function checkReminders() {
    const now = new Date();
    const oneMinuteFromNow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
    
    // Filter events that happen between now and one minute from now
    const dueEvents = events.filter(ev => {
      const evTime = new Date(ev.timestamp);
      return evTime > now && evTime <= oneDayFromNow;
    });
    
    // To avoid spamming the same reminder multiple times, we track which events were already reminded.
    // We'll use a Set in localStorage to store ids of events that got a reminder already.
    let remindedIds = new Set();
    const storedReminded = localStorage.getItem('remindedEvents');
    if (storedReminded) {
      remindedIds = new Set(JSON.parse(storedReminded));
    }
    
    for (let ev of dueEvents) {
      if (!remindedIds.has(ev.id)) {
        showReminder(ev);
        remindedIds.add(ev.id);
      }
    }
    // Save the reminded ids
    localStorage.setItem('remindedEvents', JSON.stringify([...remindedIds]));
    
    // Optional: Clean old reminded ids (for events already passed more than 10 minutes) to keep storage small
    const cleanupIds = [...remindedIds].filter(id => {
      const ev = events.find(e => e.id === id);
      if (!ev) return true;
      const evTime = new Date(ev.timestamp);
      return (now - evTime) > 10 * 60 * 1000; // older than 10 min
    });
    if (cleanupIds.length) {
      cleanupIds.forEach(id => remindedIds.delete(id));
      localStorage.setItem('remindedEvents', JSON.stringify([...remindedIds]));
    }
  }
  
  // Periodically check for reminders (every 30 seconds)
  let reminderInterval;
  function startReminderChecker() {
    if (reminderInterval) clearInterval(reminderInterval);
    checkReminders(); // immediate check
    reminderInterval = setInterval(checkReminders, 30000);
  }
  
  // Also re-render list every minute to auto-hide past events
  let renderInterval;
  function startAutoRefresh() {
    if (renderInterval) clearInterval(renderInterval);
    renderInterval = setInterval(() => {
      renderEventList(); // refresh UI (hide past events)
      checkReminders(); // also check reminders again
    }, 60000);
  }
  
  // ---------- EVENT LISTENERS & INITIALIZATION ----------
  document.addEventListener('DOMContentLoaded', () => {
    loadEvents();
    startReminderChecker();
    startAutoRefresh();
    
    // Add event button handler
    document.getElementById('addEventBtn').addEventListener('click', () => {
      const name = document.getElementById('eventName').value;
      const date = document.getElementById('eventDate').value;
      const time = document.getElementById('eventTime').value;
      if (addEvent(name, date, time)) {
        // Clear inputs after successful addition
        document.getElementById('eventName').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventTime').value = '';
      }
    });
    
    // Clear all button handler
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      clearAllEvents();
    });
    
    // Ask for notification permission on first click anywhere (or on load)
    // Better: ask when user interacts (to avoid auto-block)
    const askOnUserAction = () => {
      askNotificationPermission();
      document.removeEventListener('click', askOnUserAction);
      document.removeEventListener('keydown', askOnUserAction);
    };
    document.addEventListener('click', askOnUserAction);
    document.addEventListener('keydown', askOnUserAction);
  });
function addEventFromForm() {
    const name = document.getElementById('eventName').value;
    const date = document.getElementById('eventDate').value;
    const time = document.getElementById('eventTime').value;
    if (addEvent(name, date, time)) {
        document.getElementById('eventName').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventTime').value = '';
    }
}
</script>
</body>
</html>
