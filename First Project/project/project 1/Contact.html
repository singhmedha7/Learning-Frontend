<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>
    <header>
        <pre>
            <h1>
                  Contact The Vault 
            </h1>
                                     Leave a message....if you dare
        </pre>
        <hr>
        <nav>
            <ol type="I">
                <li><a href="Index.html"><button type="button" >Dashboard🩸</button> </a> </li>
                <li><a href="#End Of Form"><button type="reset">Back Out</button> </a> </li>
                <li><a href="#footer"><button type="button">Review Vault</button></a> </li>
            </ol>
        </nav>
        <hr>
    </header>
    <Main>
        <table border="5">
            <caption><h1>Confess Your Sins</h1></caption>
            <tr>
                <td colspan="6"><h1>Send a Scream....I Mean Message</h1></td>
            </tr>
            <tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        <label for="Username">Username</label>
                        <input type="text" id="Username" placeholder="Enter Your Name" name="Name">
                    </form>
            </td>
            </tr>
            <tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        <label for="Password">Password</label>
                        <input type="password" id="Password" value="******" name="Password" required>
                    </form>
            </td>
            </tr>
            <tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        <label for="DOB">Date Of Birth</label>
                        <input type="date" id="DOB" name="DOB">
                    </form>
            </td>
            </tr>
<tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        <label for="File">Found Footage</label>
                        <input type="file" id="File" name="File">
                    </form>
            </td>
            </tr>
<tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        <label for="Color">Color Board</label>
                        <input type="color" id="Color" name="Color">
                    </form>
            </td>
            </tr>
<tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        Favourite Horror Subgenre: <br>
                        <label for="Slashers">Slashers</label>
                        <input type="radio" id="Slashers" value="Slashers" name="Subgenre"><br>
                        <label for="Psychological">Psychological</label>
                        <input type="radio" id="Psychological" value="Psychological" name="Subgenre"><br>
                        <label for="Found Footage">Found Footage</label>
                        <input type="radio" id="Found Footage" value="Found Footage" name="Subgenre">
                    
                    </form>
            </td>
            </tr>
<tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        What Do You Enjoy The Most: <br>
                        <label for="Chase">Chase Scenes</label>
                        <input type="checkbox" id="Chase" value="Chase Scenes" name="Enjoyable"><br>
                        <label for="final girl">Badass Final Girl</label>
                        <input type="checkbox" id="final girl" value="Badass Final Girl" name="Enjoyable"><br>
                        <label for="Twist">Unexpected Twist</label>
                        <input type="checkbox" id="Twist" value="Unexpected Twist" name="Enjoyable">
                    
                    </form>
            </td>
            </tr>
            <tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                        <label for="Top">Top Pick</label>
                        <select name="Top Pick" id="Top"> 
                            <option>--select--</option>
                            <option value="Hereditary">Hereditary</option>
                            <option value="The Shining">The Shining</option>
                            <option value="Blair Witch">Blair Witch</option>
                            <option value="Other">Other</option>
                        </select><br>
                        If Other: <br>
                        <textarea rows="1" cols="24">Specify</textarea>
                        <br>
                        How Much Did You Like It:
                        <input type="range" value="This Much" name="Likeness">
                    </form>
            </td>
            </tr>
<tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain">
                         <textarea rows="10" cols="30">Your Confession</textarea>               
                    </form>
            </td>
            </tr>
<tr>
                <td colspan="6">
                    <form action="#" method="post" enctype="text/plain" id="End Of Form">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </form>
            </td>
            </tr>
        </table>
        <hr>

    </Main>
    <footer id="footer">
        <iframe src="Index.html" frameborder="2" height="300px" width="700px"></iframe>
    </footer>
    
</body>
</html>
