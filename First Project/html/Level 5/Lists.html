<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <!--List Tag-->

    <!--Ordered List is used for creating lists with items that have a specific order.
    Items are automatically numbered.
    Can be nestled inside other lists.
    <ol> tag is used-->
    <ol>
        <li>Item one</li>
        <li>Item two</li>
        <ol>
            <li>one</li>
            <li>two</li>
        </ol>
    </ol>
    <!--Attribute 'type' is used to make the order of thee list A, a, I, i -->
    <ol type="I">
        <li>HTML</li>
        <ol type="A">
            <li type="i">Lists</li>
            <li>Ordered lists</li>
            <li>Unordered lists</li>
        </ol>
        <li>CSS</li>
    </ol>
    

    <!--<ul> is used to define unordered lists.
        Order doesn't matter.
        Can be nested.-->
    <ul>
        <li>Crochet</li>
        <li>Writing</li>
    </ul>
</body>
</html>
