<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFrame</title>
</head>
<body>
    <!--<iframe> tag is used to include other webside into our own website.
        Uses src, height, and width to embed the webpage or multiple website.
        Some pages may not connect due to security reasons-->
    <iframe src="https://www.wikipedia.com"  height="300px" width="400px" ></iframe>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/rklidcZ-aLU?si=tfezAnbK5WK7kpqg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
