<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold, Italics, Underline, Strikethrough, Big and Small, Supeerscript, Subscript, and Text formatting</title>
</head>
<body>
    <!-- The following tags are primarily used for text styling and emphasis-->

    <!--<b> or bold makes the text bold-->
    <b>Bold</b><hr>

    <!--<i> or italics makes the text italic-->
    <i>Italics</i><hr>

    <!--<u> or underline is used to underline a text-->
    <u>Underline</u><hr>

    <!--<s> or <strike> is used to strikethrough a text-->
    <s>Strikethrough</s><hr>

    <!--<pre> tag is used to preserve text formatting.
    It maintains things like white spaces and line breaks
    Useful for displaying code.-->
    Ria Sharma
    21    Sixth grade
    <pre>
<b>Ria Sharma</b> 
21    Sixth grade
    </pre><hr>

    <!--<big> and <small> tags are used to alter text size.
    Less commonly used as CSS alternatives exist.
    <sup> makes text superscript.
    <sub> makes text subscript.
    These two are usually used for mathematical equations or footnotes.
    They does not change text size just position.-->
    <big>(a+b)2=a2&nbsp;+b2+2ab</big><br>
    <small>(a+b)<sup>2</sup>=a<sup>2</sup> + b<sup>2</sup> + 2ab</small><hr>
    <big>ImportantTM</big><br>
    <small>Improtant<sub>TM</sub></small>

    <!-- Character entity references are used to display or reference a particular reserved or special character.
     &nbsp; is used to give space-->

</body>
</html>
