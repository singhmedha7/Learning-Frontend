<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span</title>
</head>
<body>
    <!-- <div> tag is a non-semantic tag.
        It acts as a container for other tags.
        Doesn't provide any inherent meaning.
        Commonly used for styling and layout for a particular set of content via CSS.
        Highly versatile and can be nested.
        Block element(it takes complete block)-->
    <div>
        <a href="#dummy">Dummy</a>
        <p id="dummy">This is a para</p>
        <big>This is used for big</big>

    </div>


    <!-- <span> is an inline element that is used to manipulate or style a potion of text,
        Non-semantic.
        Commonly used for changing colour, font, or adding effects.
        Doesn't break text flow or create a new block level.-->
    <p>
        Lorem ipsum <span id="dolor">dolor</span> sit amet consectetur, adipisicing elit. Quo, ad?
        <!-- inspect can be used to change the colour of dolor by color : color_name-->
        <br>Lorem <span class="highlighted">ipsum</span> dolor sit amet.
    </p>
</body>
</html>
